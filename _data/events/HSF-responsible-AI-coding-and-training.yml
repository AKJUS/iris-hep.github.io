description: This meeting will first gather community experiences and practices on responsible AI-assisted coding in HEP software, aiming to shape a loose set of suggested guidelines through short topic presentations and discussion. It will then cover HSF training plans informed by a community survey, followed by a discussion of conclusions, next steps, and future directions.
